name: Diagnostic check

on:
  push:
    branches: [diagnostic-run]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm exec tsc -b lib/db/tsconfig.json lib/api-zod/tsconfig.json
      - shell: bash
        run: pnpm --filter @workspace/api-server run typecheck > typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
