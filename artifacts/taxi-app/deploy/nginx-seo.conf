# ============================================================================
# Taxi B&B GmbH – nginx SEO/Performance-Konfiguration
# Kanonische Domain: https://taxibbessen.de  (ohne www, ohne Bindestrich)
#
# Diese Datei ist eine REFERENZ. Fügen Sie die Blöcke in Ihre bestehende
# nginx-Konfiguration ein (meist /etc/nginx/sites-available/taxibbessen.de).
# Nach Änderungen:  sudo nginx -t && sudo systemctl reload nginx
# ============================================================================

# --- 1) HTTP -> HTTPS + www -> non-www (URL-Kanonisierung, HIGH) ------------
server {
    listen 80;
    listen [::]:80;
    server_name taxibbessen.de www.taxibbessen.de;
    # Alles auf HTTPS + kanonische Domain umleiten (301 = dauerhaft)
    return 301 https://taxibbessen.de$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.taxibbessen.de;
    # SSL-Zertifikate (Pfade an Ihre Certbot-Installation anpassen)
    ssl_certificate     /etc/letsencrypt/live/taxibbessen.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taxibbessen.de/privkey.pem;
    # www -> non-www
    return 301 https://taxibbessen.de$request_uri;
}

# --- 2) Haupt-Server (kanonisch) -------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name taxibbessen.de;

    ssl_certificate     /etc/letsencrypt/live/taxibbessen.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taxibbessen.de/privkey.pem;

    # Pfad zum Build-Output (dist/public). Anpassen an Ihren Deploy-Pfad.
    root /var/www/taxibbessen/dist/public;
    index index.html;

    # --- gzip-Komprimierung (HTML-Kompression, LOW) ------------------------
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/rss+xml image/svg+xml font/woff2;

    # --- Brotli (optional, falls Modul installiert) ------------------------
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # --- Cache-Header für statische Assets (MEDIUM) ------------------------
    # Gehashte Assets (Vite: assets/index-XXXX.js) -> 1 Jahr immutable
    # WICHTIG: ^~ damit dieser Block Vorrang vor den Regex-Blöcken unten hat,
    # sonst greifen die kürzeren .(css|js|webp)-TTLs für gehashte Assets.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bilder
    location ~* \.(webp|png|jpe?g|gif|svg|ico|avif)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # Schriften
    location ~* \.(woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # CSS/JS (nicht-gehasht)
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Videos
    location ~* \.(mp4|webm)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # --- SPA-Routing: prerenderte Routen bevorzugen, sonst index.html -------
    # Vite-Build erzeugt pro Route /<route>/index.html (Prerendering).
    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
        # HTML selbst NICHT lange cachen, damit Updates sofort sichtbar sind
        add_header Cache-Control "no-cache";
    }

    # robots.txt & sitemap.xml direkt ausliefern
    location = /robots.txt  { access_log off; }
    location = /sitemap.xml { access_log off; }
}

# ============================================================================
# 3) SPF-Record (LOW, E-Mail-Spoofing-Schutz) — KEIN nginx, sondern DNS:
#    TXT-Eintrag bei Ihrem Domain-Anbieter für taxibbessen.de:
#      v=spf1 include:outlook.com -all
#    (anpassen je nachdem über welchen Anbieter taxibb@outlook.com versendet)
# ============================================================================
