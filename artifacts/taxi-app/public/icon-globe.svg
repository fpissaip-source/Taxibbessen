  <ellipse cx="200" cy="145" rx="140" ry="25" fill="none" stroke="#c8a55e" stroke-width="1" opacity="0.5"/>
  <ellipse cx="200" cy="255" rx="140" ry="25" fill="none" stroke="#c8a55e" stroke-width="1" opacity="0.5"/>
  <!-- Meridian lines -->
  <ellipse cx="200" cy="200" rx="50" ry="158" fill="none" stroke="#c8a55e" stroke-width="1" opacity="0.5"/>
  <ellipse cx="200" cy="200" rx="120" ry="158" fill="none" stroke="#c8a55e" stroke-width="1" opacity="0.5"/>
</svg>
