<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <!-- Outer circle -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="#c8a55e" stroke-width="3"/>
  <!-- Inner circle -->
  <circle cx="200" cy="200" r="12" fill="none" stroke="#c8a55e" stroke-width="3"/>
  <!-- Hour hand (pointing ~10 o'clock) -->
  <line x1="200" y1="200" x2="145" y2="140" stroke="#c8a55e" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (pointing ~12) -->
  <line x1="200" y1="200" x2="200" y2="85" stroke="#c8a55e" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Hour markers -->
  <line x1="200" y1="52" x2="200" y2="68" stroke="#c8a55e" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="332" x2="200" y2="348" stroke="#c8a55e" stroke-width="3" stroke-linecap="round"/>
  <line x1="52" y1="200" x2="68" y2="200" stroke="#c8a55e" stroke-width="3" stroke-linecap="round"/>
  <line x1="332" y1="200" x2="348" y2="200" stroke="#c8a55e" stroke-width="3" stroke-linecap="round"/>
  <!-- 24/7 text -->
  <text x="200" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#c8a55e">24/7</text>
</svg>
