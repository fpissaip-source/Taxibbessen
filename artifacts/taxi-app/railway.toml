[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/taxi-app run build"

[deploy]
startCommand = "npx serve -l $PORT -s artifacts/taxi-app/dist/public"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
