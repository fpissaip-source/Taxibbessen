[build]
builder = "nixpacks"
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/taxi-app run build"

[deploy]
startCommand = "npx serve@14 artifacts/taxi-app/dist/public -s -p $PORT"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
