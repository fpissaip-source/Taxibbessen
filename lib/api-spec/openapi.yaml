openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Taxi B&B GmbH API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bookings
    description: Booking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List all bookings
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a booking
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingInput"
      responses:
        "201":
          description: Created booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found

  /bookings/{id}/status:
    patch:
      operationId: updateBookingStatus
      tags: [bookings]
      summary: Update booking status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BookingStatusUpdate"
      responses:
        "200":
          description: Updated booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    BookingStatus:
      type: string
      enum: [new, accepted, completed, rejected]

    Booking:
      type: object
      required:
        - id
        - pickupLocation
        - destination
        - customerName
        - customerLastName
        - customerPhone
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        pickupLocation:
          type: string
        destination:
          type: string
        customerName:
          type: string
        customerLastName:
          type: string
        customerPhone:
          type: string
        scheduledTime:
          type: ["string", "null"]
        estimatedDistance:
          type: ["number", "null"]
        estimatedDuration:
          type: ["number", "null"]
        passengerCount:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        foundVia:
          type: ["string", "null"]
        laterPickup:
          type: ["string", "null"]
        returnPickupTime:
          type: ["string", "null"]
        returnPickupLocation:
          type: ["string", "null"]
        returnDestination:
          type: ["string", "null"]
        callbackTime:
          type: ["string", "null"]
        status:
          $ref: "#/components/schemas/BookingStatus"
        createdAt:
          type: string
        updatedAt:
          type: string

    BookingInput:
      type: object
      required:
        - pickupLocation
        - destination
        - customerName
        - customerLastName
        - customerPhone
      properties:
        pickupLocation:
          type: string
        destination:
          type: string
        customerName:
          type: string
        customerLastName:
          type: string
        customerPhone:
          type: string
        scheduledTime:
          type: ["string", "null"]
        estimatedDistance:
          type: ["number", "null"]
        estimatedDuration:
          type: ["number", "null"]
        passengerCount:
          type: ["integer", "null"]
        notes:
          type: ["string", "null"]
        foundVia:
          type: ["string", "null"]
        laterPickup:
          type: ["string", "null"]
        returnPickupTime:
          type: ["string", "null"]
        returnPickupLocation:
          type: ["string", "null"]
        returnDestination:
          type: ["string", "null"]
        callbackTime:
          type: ["string", "null"]

    BookingStatusUpdate:
      type: object
      required:
        - status
      properties:
        status:
          $ref: "#/components/schemas/BookingStatus"
